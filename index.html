const todayISO   = () => new Date().toISOString().split("T")[0];
const fmtISO     = (iso) => { const [y,m,d]=iso.split("-"); return `${d}.${m}.${y}`; };

// ── Contracts ─────────────────────────────────────────────────────────────────
function groupByBankPair(data) {
  const out={};
  data.forEach(c=>{
    if(!out[c.bk])out[c.bk]={};
    const k=`${c.cc}→${c.st}`;
    if(!out[c.bk][k])out[c.bk][k]=[];
    out[c.bk][k].push(c);
  });
  return out;
}
function ContractTable({rows,pair}) {
  const [cc,st]=pair.split("→");
  const totAmt=rows.reduce((s,r)=>s+r.amt,0);
  const totVal=rows.reduce((s,r)=>s+r.val,0);
  return (
    <div style={{marginBottom:16}}>
      <div style={{fontSize:12,fontWeight:500,color:"#555",marginBottom:6,display:"flex",alignItems:"center",gap:6}}>
        <CcyTag cc={cc}/><span style={{color:"#ccc"}}>→</span><CcyTag cc={st}/>
        <span style={{fontSize:11,color:"#bbb",marginLeft:"auto"}}>{rows.length} contract{rows.length!==1?"s":""}</span>
      </div>
      <div style={{overflowX:"auto"}}>
        <table style={{width:"100%",borderCollapse:"collapse"}}>
          <thead><tr>
            <th style={T.hd}>Contract #</th><th style={T.hd}>Date</th>
            <th style={{...T.hd,...T.r}}>Amount {cc}</th><th style={{...T.hd,...T.r}}>Spot</th>
            <th style={{...T.hd,...T.r}}>Prem.</th><th style={{...T.hd,...T.r}}>Total</th>
            <th style={{...T.hd,...T.r}}>Value {st}</th><th style={T.hd}>Delivery</th>
            <th style={{...T.hd,...T.r}}>Used</th>
          </tr></thead>
          <tbody>
            {rows.map(c=>(
              <tr key={c.id}>
                <td style={{...T.td,...T.mono}}>{c.num}</td>
                <td style={{...T.td,color:"#888",fontSize:11}}>{c.dt}</td>
                <td style={{...T.td,...T.r,...T.mono}}>{f(c.amt,cc)}</td>
                <td style={{...T.td,...T.r,color:"#888",fontSize:11}}>{fR(c.sp)}</td>
                <td style={{...T.td,...T.r,color:"#888",fontSize:11}}>{fR(c.pr)}</td>
                <td style={{...T.td,...T.r,fontWeight:500,...T.mono}}>{fR(c.tot)}</td>
                <td style={{...T.td,...T.r,...T.mono}}>{f(c.val,st)}</td>
                <td style={{...T.td,color:"#888",fontSize:11}}>{c.del}</td>
                <td style={{...T.td,...T.r,...T.mono,color:c.used>0?"#0F6E56":"#ccc"}}>{c.used>0?f(c.used,cc):"—"}</td>
              </tr>
            ))}
            <tr>
              <td colSpan={2} style={{...T.td,fontSize:11,fontWeight:500,color:"#888",borderBottom:"none",paddingTop:10}}>Subtotal</td>
              <td style={{...T.td,...T.r,...T.mono,fontWeight:500,borderBottom:"none",paddingTop:10}}>{f(totAmt,cc)}</td>
              <td colSpan={3} style={{...T.td,borderBottom:"none"}}/>
              <td style={{...T.td,...T.r,...T.mono,fontWeight:500,borderBottom:"none",paddingTop:10}}>{f(totVal,st)}</td>
              <td colSpan={2} style={{...T.td,borderBottom:"none"}}/>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  );
}
function BankBlock({bank,pairs}) {
  const [open,setOpen]=useState(true);
  const opts=OPTS.filter(o=>o.bk===bank);

            <div style={{fontSize:12,fontWeight:500,color:"#555",marginBottom:6}}>
              <span style={{fontSize:10,fontWeight:500,padding:"1px 6px",borderRadius:3,background:"#FAEEDA",color:"#633806"}}>USD options · Risk reversals</span>
            </div>
            <table style={{width:"100%",borderCollapse:"collapse"}}>

                <th style={T.hd}>Type</th><th style={T.hd}>Date</th>

}

// ── In Flow ───────────────────────────────────────────────────────────────────
function InflowPage({inflow,setInflow,bump}) {
  const [adding,setAdding]=useState(false);
  const [ns,setNs]=useState(""); const [nc,setNc]=useState("EUR");
  const [na,setNa]=useState(""); const [nd,setNd]=useState("");
  const eurRem=inflow.filter(i=>i.cc==="EUR").reduce((s,i)=>s+(i.original-i.received),0);
  const usdRem=inflow.filter(i=>i.cc==="USD").reduce((s,i)=>s+(i.original-i.received),0);
  const add=async()=>{
    if(!ns.trim()||!na||!nd.trim())return;
    const next=[...inflow,{id:"i"+Date.now(),source:ns.trim(),cc:nc,original:parseFloat(na),received:0,date:nd.trim()}];
    setInflow(next); LS.set(K.inflow,next);
    bump(`Inflow source added · ${ns.trim()} · ${nc} ${fM(parseFloat(na),nc)}`,{inflow:next});
    setNs(""); setNa(""); setNd(""); setAdding(false);
  };
  return (
    <div>
      <PH title="In flow" sub="Expected trade receivables · Running balances"/>
      <Cards items={[
        {label:"EUR remaining",value:fM(eurRem,"EUR"),sub:"receivable balance"},
        {label:"USD remaining",value:fM(usdRem,"USD"),sub:"receivable balance"},
        {label:"Active heads", value:String(inflow.filter(i=>i.original-i.received>0).length),sub:`of ${inflow.length} total`},
      ]}/>
      <table style={{width:"100%",borderCollapse:"collapse"}}>
        <thead><tr>
          <th style={T.hd}>Source</th><th style={T.hd}></th>
          <th style={{...T.hd,...T.r}}>Original</th>
          <th style={{...T.hd,...T.r}}>Received</th>
          <th style={{...T.hd,...T.r}}>Remaining</th>
          <th style={T.hd}>Due</th><th style={T.hd}>Status</th>
        </tr></thead>
        <tbody>{inflow.map(i=>{
          const rem=i.original-i.received, pct=Math.round((rem/i.original)*100);
          return (
            <tr key={i.id}>
              <td style={{...T.td,fontWeight:500}}>{i.source}</td>
              <td style={T.td}><CcyTag cc={i.cc}/></td>
              <td style={{...T.td,...T.r,...T.mono,color:"#aaa"}}>{f(i.original,i.cc)}</td>
              <td style={{...T.td,...T.r,...T.mono}}>{i.received>0?f(i.received,i.cc):"—"}</td>
              <td style={{...T.td,...T.r,...T.mono,fontWeight:500}}>{f(rem,i.cc)}</td>
              <td style={{...T.td,color:"#888",fontSize:11}}>{i.date}</td>
              <td style={T.td}><Bar pct={pct}/></td>
            </tr>
          );
        })}</tbody>
      </table>
      {adding?(
        <div style={{marginTop:16,padding:16,background:"#f7f7f5",borderRadius:8}}>
          <div style={{display:"grid",gridTemplateColumns:"1fr 80px 1fr 1fr",gap:12,marginBottom:12}}>
            <div><label style={T.lbl}>Source</label><input style={T.inp} value={ns} onChange={e=>setNs(e.target.value)} placeholder="e.g. Ghana 1"/></div>
            <div><label style={T.lbl}>Ccy</label><select style={T.inp} value={nc} onChange={e=>setNc(e.target.value)}><option>EUR</option><option>USD</option></select></div>
            <div><label style={T.lbl}>Amount</label><input style={T.inp} type="number" value={na} onChange={e=>setNa(e.target.value)} placeholder="0.00"/></div>
            <div><label style={T.lbl}>Due date</label><input style={T.inp} value={nd} onChange={e=>setNd(e.target.value)} placeholder="DD.MM.YYYY"/></div>
          </div>
          <div style={{display:"flex",gap:8}}>
            <button style={T.btn} onClick={add}>Add</button>
            <button style={T.btnG} onClick={()=>setAdding(false)}>Cancel</button>
          </div>
        </div>
      ):(
        <button style={{...T.btnG,marginTop:16}} onClick={()=>setAdding(true)}><IcoPlus size={14}/>Add source</button>
      )}
    </div>
  );
}

// ── Receipts ──────────────────────────────────────────────────────────────────
function ReceiptsPage({inflow,setInflow,personal,setPersonal,master,setMaster,receipts,setReceipts,bump}) {
  const [srcId,setSrcId]=useState(""); const [bankId,setBankId]=useState("");
  const [ctrId,setCtrId]=useState(""); const [amt,setAmt]=useState("");
  const [date,setDate]=useState(todayISO()); const [note,setNote]=useState("");
  const [msg,setMsg]=useState(null);
  const src=inflow.find(i=>i.id===srcId);
  const ctr=personal.find(c=>c.id===ctrId);
  const srcRem=src?src.original-src.received:0;
  const ctrRem=ctr?ctr.amt-ctr.used:0;
  const amtN=parseFloat(amt)||0;
  const limit=Math.min(srcRem,ctr?ctrRem:Infinity);
  const overLt=amtN>0&&amtN>limit;
  const banks=useMemo(()=>{
    if(!src)return[];
    return [...new Set(personal.filter(c=>c.cc===src.cc&&(c.amt-c.used)>0).map(c=>c.bk))];
  },[src,personal]);
  const ctrs=useMemo(()=>{
    if(!src||!bankId)return[];
    return personal.filter(c=>c.bk===bankId&&c.cc===src.cc&&(c.amt-c.used)>0);
  },[src,bankId,personal]);
  const flash=(text,err=false)=>{setMsg({text,err});setTimeout(()=>setMsg(null),4500);};
  const submit=async()=>{
    if(!src){flash("Select an inflow source",true);return;}
    if(!ctr){flash("Select a forward contract",true);return;}
    if(amtN<=0){flash("Enter a valid amount",true);return;}
    if(amtN>srcRem){flash(`Exceeds inflow balance (${f(srcRem,src.cc)})`,true);return;}
    if(amtN>ctrRem){flash(`Exceeds contract capacity (${f(ctrRem,ctr.cc)})`,true);return;}
    const nI=inflow.map(i=>i.id===srcId?{...i,received:i.received+amtN}:i);
    const nP=personal.map(c=>c.id===ctrId?{...c,used:c.used+amtN}:c);
    const nM=master.map(c=>c.id===ctrId?{...c,used:c.used+amtN}:c);
    const entry={id:Date.now(),date,srcId,ctrId,amt:amtN,note:note.trim(),srcName:src.source,ctrNum:ctr.num,bk:ctr.bk,cc:src.cc};
    const nR=[entry,...receipts];
    setInflow(nI); setPersonal(nP); setMaster(nM); setReceipts(nR);
    LS.set(K.inflow,nI); LS.set(K.personal,nP); LS.set(K.master,nM); LS.set(K.receipts,nR);
    bump(`Receipt · ${src.source} · ${f(amtN,src.cc)} · ${ctr.bk} ${ctr.num}`,{inflow:nI,master:nM,personal:nP,receipts:nR});
    flash(`✓ Logged ${f(amtN,src.cc)} · ${src.source} → ${ctr.bk} ${ctr.num}`);
    setAmt(""); setNote(""); setSrcId(""); setBankId(""); setCtrId("");
  };
  const reverse=async(id)=>{
    const e=receipts.find(r=>r.id===id); if(!e)return;
    const nI=inflow.map(i=>i.id===e.srcId?{...i,received:Math.max(0,i.received-e.amt)}:i);
    const nP=personal.map(c=>c.id===e.ctrId?{...c,used:Math.max(0,c.used-e.amt)}:c);
    const nM=master.map(c=>c.id===e.ctrId?{...c,used:Math.max(0,c.used-e.amt)}:c);
    const nR=receipts.filter(r=>r.id!==id);
    setInflow(nI); setPersonal(nP); setMaster(nM); setReceipts(nR);
    LS.set(K.inflow,nI); LS.set(K.personal,nP); LS.set(K.master,nM); LS.set(K.receipts,nR);
    bump(`Reversed · ${e.srcName} · ${f(e.amt,e.cc)}`,{inflow:nI,master:nM,personal:nP,receipts:nR});
    flash(`Reversed ${f(e.amt,e.cc)} from ${e.srcName}`);
  };
  return (
    <div>
      <PH title="Log receipt" sub="Daily credit — cascades to inflow balance + forward contract (master & copy)"/>
      <div style={{padding:20,background:"#f7f7f5",borderRadius:10,marginBottom:28}}>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"14px 20px",marginBottom:16}}>
          <div>
            <label style={T.lbl}>Inflow source</label>
            <select style={T.inp} value={srcId} onChange={e=>{setSrcId(e.target.value);setBankId("");setCtrId("");}}>
              <option value="">— select —</option>
              {inflow.map(i=>{const rem=i.original-i.received;return <option key={i.id} value={i.id}>{i.source} · {fM(rem,i.cc)} rem.</option>;})}
            </select>
            <div style={{fontSize:11,color:"#0F6E56",marginTop:3,minHeight:16}}>{src?`Balance: ${f(srcRem,src.cc)}`:""}</div>
          </div>
          <div>
            <label style={T.lbl}>Amount {src&&<CcyTag cc={src.cc}/>}</label>
            <input style={{...T.inp,borderColor:overLt?"#E24B4A":"#ddd"}} type="number" value={amt} onChange={e=>setAmt(e.target.value)} placeholder="0.00"/>
            <div style={{fontSize:11,color:overLt?"#A32D2D":amtN>0?"#0F6E56":"transparent",marginTop:3,minHeight:16}}>
              {overLt?`Over limit — max ${f(limit,src?.cc||"USD")}`:amtN>0?"Within limits":"."}
            </div>
          </div>
          <div>
            <label style={T.lbl}>Bank</label>
            <select style={T.inp} value={bankId} onChange={e=>{setBankId(e.target.value);setCtrId("");}}>
              <option value="">{src?"— select —":"— select source first —"}</option>
              {banks.map(b=><option key={b} value={b}>{BANK_LABEL[b]||b}</option>)}
            </select>
            <div style={{fontSize:11,color:"#999",marginTop:3,minHeight:16}}>{bankId?`${ctrs.length} contract${ctrs.length!==1?"s":""} with capacity`:""}</div>
          </div>
          <div>
            <label style={T.lbl}>Forward contract</label>
            <select style={T.inp} value={ctrId} onChange={e=>setCtrId(e.target.value)}>
              <option value="">{bankId?"— select —":"— select bank first —"}</option>
              {ctrs.map(c=>{const r=c.amt-c.used;return <option key={c.id} value={c.id}>{c.num} · {fM(r,c.cc)} avail · del {c.del}</option>;})}
            </select>
            <div style={{fontSize:11,color:"#0F6E56",marginTop:3,minHeight:16}}>{ctr?`Available: ${f(ctrRem,ctr.cc)} · ${ctr.cc}→${ctr.st} · Delivery: ${ctr.del}`:""}</div>
          </div>
          <div>
            <label style={T.lbl}>Value date</label>
            <input style={T.inp} type="date" value={date} onChange={e=>setDate(e.target.value)}/>
          </div>
          <div>
            <label style={T.lbl}>Remark</label>
            <input style={T.inp} value={note} onChange={e=>setNote(e.target.value)} placeholder="e.g. partial · 1st tranche"/>
          </div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <button style={T.btn} onClick={submit}>Log receipt</button>
          {msg&&<span style={{fontSize:12,color:msg.err?"#A32D2D":"#0F6E56"}}>{msg.text}</span>}
        </div>
      </div>
      <h2 style={{fontSize:15,fontWeight:600,marginBottom:14,letterSpacing:"-0.01em"}}>Receipt history</h2>
      {receipts.length===0?(
        <div style={{textAlign:"center",padding:"40px 20px",color:"#bbb",fontSize:13}}>No receipts logged yet.</div>
      ):(
        <table style={{width:"100%",borderCollapse:"collapse"}}>
          <thead><tr>
            <th style={T.hd}>Date</th><th style={T.hd}>Source</th>
            <th style={T.hd}>Bank · Contract</th><th style={{...T.hd,...T.r}}>Amount</th>
            <th style={T.hd}>Remark</th><th style={{...T.hd,width:30}}></th>
          </tr></thead>
          <tbody>{receipts.map(e=>(
            <tr key={e.id}>
              <td style={{...T.td,color:"#888",fontSize:11}}>{e.date}</td>
              <td style={{...T.td,fontWeight:500}}>{e.srcName}</td>
              <td style={{...T.td,...T.mono,color:"#888"}}>{e.bk} · {e.ctrNum}</td>
              <td style={{...T.td,...T.r,...T.mono,fontWeight:500}}>{f(e.amt,e.cc)}</td>
              <td style={{...T.td,color:"#888",fontSize:11}}>{e.note||"—"}</td>
              <td style={{...T.td,textAlign:"center"}}>
                <button onClick={()=>reverse(e.id)} style={{background:"none",border:"none",cursor:"pointer",color:"#bbb",padding:2}} title="Reverse entry">
                  <IcoReverse size={13}/>
                </button>
              </td>
            </tr>
          ))}</tbody>
        </table>
      )}
    </div>
  );
}

// ── Limits ────────────────────────────────────────────────────────────────────
function LimitsPage({limits}) {
  const tot=limits.reduce((a,l)=>({limit:a.limit+l.limit,availed:a.availed+l.availed}),{limit:0,availed:0});
  return (
    <div>
      <PH title="Bank credit limits" sub="Facility utilization · USD million"/>
      <Cards items={[
        {label:"Total limit",value:"$"+tot.limit.toFixed(2)+"M"},
        {label:"Availed",    value:"$"+tot.availed.toFixed(2)+"M"},
        {label:"Available",  value:"$"+(tot.limit-tot.availed).toFixed(2)+"M"},
      ]}/>
      <div style={{display:"flex",flexDirection:"column",gap:14}}>
        {limits.map((l,i)=>{
          const bal=l.limit-l.availed, pct=l.limit>0?Math.round((l.availed/l.limit)*100):0;
          const danger=pct>90, warn=pct>70;
          return (
            <div key={l.bk} style={{borderLeft:`3px solid ${BANK_CLR[l.bk]||"#ccc"}`,paddingLeft:16,paddingBottom:14,borderBottom:i<limits.length-1?"0.5px solid #f0f0ee":"none"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                <span style={{fontSize:12,fontWeight:500,color:BANK_CLR[l.bk]}}>{l.bk}</span>
                <span style={{fontSize:11,color:danger?"#A32D2D":warn?"#854F0B":"#888"}}>{pct}% utilized</span>
              </div>
              <div style={{height:6,background:"#eee",borderRadius:3,overflow:"hidden",marginBottom:10}}>
                <div style={{height:"100%",borderRadius:3,width:`${pct}%`,background:danger?"#E24B4A":warn?"#EF9F27":"#5DCAA5",transition:"width .3s"}}/>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,fontSize:12}}>
                {[["Limit",`$${l.limit.toFixed(2)}M`],["Availed",`$${l.availed.toFixed(2)}M`],["Balance",`$${bal.toFixed(2)}M`]].map(([lbl,val],j)=>(
                  <div key={j}><span style={{fontSize:10,color:"#999"}}>{lbl}</span><div style={{fontWeight:500,fontVariantNumeric:"tabular-nums",color:j===2&&danger?"#A32D2D":"#0f0f0f"}}>{val}</div></div>
                ))}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}


// ── Dashboard ─────────────────────────────────────────────────────────────────
function DashboardPage({personal,inflow,limits,receipts}) {
  const eurHedge =personal.filter(c=>c.cc==="EUR").reduce((s,c)=>s+(c.amt-c.used),0);
  const usdHedge =personal.filter(c=>c.cc==="USD").reduce((s,c)=>s+(c.amt-c.used),0);
  const eurInflow=inflow.filter(i=>i.cc==="EUR").reduce((s,i)=>s+(i.original-i.received),0);
  const usdInflow=inflow.filter(i=>i.cc==="USD").reduce((s,i)=>s+(i.original-i.received),0);
  const hdfc=limits.find(l=>l.bk==="HDFC");
  const hdfcPct=hdfc?Math.round((hdfc.availed/hdfc.limit)*100):0;
  const urgentCtrs=personal.filter(c=>{const d=daysUntil(c.del);return d!==null&&d>=0&&d<=30&&(c.amt-c.used)>0;});
  const monthMap={};
  personal.forEach(c=>{
    const d=parseDel(c.del); if(!d)return;
    const label=d.toLocaleString("en-US",{month:"short",year:"numeric"});
    const sortKey=`${d.getFullYear()}${String(d.getMonth()+1).padStart(2,"0")}`;
    if(!monthMap[label])monthMap[label]={label,sortKey,eur:0,usd:0,count:0};
    const rem=c.amt-c.used;
    if(c.cc==="EUR")monthMap[label].eur+=rem;
    if(c.cc==="USD")monthMap[label].usd+=rem;
    monthMap[label].count++;
  });
  const months=Object.values(monthMap).sort((a,b)=>a.sortKey.localeCompare(b.sortKey));
  const secHead={fontSize:11,fontWeight:600,color:"#999",textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:12};
  return (
    <div>
      <PH title="Dashboard" sub="Live position summary"/>
      <Cards items={[
        {label:"EUR hedged avail.", value:fM(eurHedge,"EUR"),  sub:"contract notional remaining"},
        {label:"USD hedged avail.", value:fM(usdHedge,"USD"),  sub:"contract notional remaining"},
        {label:"EUR in flow",       value:fM(eurInflow,"EUR"), sub:"receivable balance"},
        {label:"USD in flow",       value:fM(usdInflow,"USD"), sub:"receivable balance"},
      ]}/>
      {(hdfcPct>=90||urgentCtrs.length>0)&&(
        <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:24}}>
          {hdfcPct>=90&&(
            <div style={{background:"#FDF2F2",border:"0.5px solid #F5C6C6",borderRadius:8,padding:"10px 14px",fontSize:12,color:"#A32D2D",display:"flex",gap:8,alignItems:"flex-start"}}>
              <IcoAlert size={14} style={{marginTop:1,flexShrink:0}}/>
              <span><strong>HDFC credit limit critical — </strong>{hdfcPct}% utilized (${hdfc.availed.toFixed(2)}M of ${hdfc.limit.toFixed(2)}M). Only ${(hdfc.limit-hdfc.availed).toFixed(2)}M remaining.</span>
            </div>
          )}
          {urgentCtrs.length>0&&(
            <div style={{background:"#FFF8F0",border:"0.5px solid #F5DDB0",borderRadius:8,padding:"10px 14px",fontSize:12,color:"#854F0B",display:"flex",gap:8,alignItems:"flex-start"}}>
              <IcoAlert size={14} style={{marginTop:1,flexShrink:0}}/>
              <span><strong>{urgentCtrs.length} contract{urgentCtrs.length!==1?"s":""} delivering within 30 days</strong> with open notional: {urgentCtrs.map(c=>`${c.num} (${daysUntil(c.del)}d · ${fM(c.amt-c.used,c.cc)})`).join(" · ")}</span>
            </div>
          )}
        </div>
      )}
      <h2 style={secHead}>Hedge vs inflow coverage</h2>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:28}}>
        {[{cc:"EUR",hedge:eurHedge,inf:eurInflow},{cc:"USD",hedge:usdHedge,inf:usdInflow}].map(({cc,hedge,inf})=>{
          const gap=hedge-inf, clr=cc==="EUR"?"#0C447C":"#3B6D11";
          return (
            <div key={cc} style={{...T.card,borderLeft:`3px solid ${clr}`}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                <CcyTag cc={cc}/>
                <span style={{fontSize:11,fontWeight:500,color:gap>=0?"#0F6E56":"#A32D2D"}}>{gap>=0?"Covered":"Shortfall"}</span>
              </div>
              <div style={{fontSize:12}}>
                {[["Hedge avail.",hedge],["Inflow expected",inf]].map(([lbl,val])=>(
                  <div key={lbl} style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                    <span style={{color:"#999"}}>{lbl}</span>
                    <span style={{fontWeight:500,fontVariantNumeric:"tabular-nums"}}>{fM(val,cc)}</span>
                  </div>
                ))}
                <div style={{display:"flex",justifyContent:"space-between",paddingTop:6,borderTop:"0.5px solid #e5e5e3"}}>
                  <span style={{color:"#999"}}>Surplus / gap</span>
                  <span style={{fontWeight:500,color:gap>=0?"#0F6E56":"#A32D2D",fontVariantNumeric:"tabular-nums"}}>{gap>=0?"+":""}{fM(gap,cc)}</span>
                </div>
              </div>
            </div>
          );
        })}
      </div>
      <h2 style={secHead}>Delivery timeline</h2>
      <table style={{width:"100%",borderCollapse:"collapse",marginBottom:24}}>
        <thead><tr>
          <th style={T.hd}>Month</th><th style={{...T.hd,...T.r}}>EUR notional</th>
          <th style={{...T.hd,...T.r}}>USD notional</th><th style={{...T.hd,...T.r}}>Contracts</th>
        </tr></thead>
        <tbody>{months.map(m=>{
          const [mon,yr]=m.label.split(" ");
          const d=new Date(`${mon} 1, ${yr}`);
          const daysAway=Math.round((d-new Date())/(864e5));
          const soon=daysAway>=0&&daysAway<=30;
          return (
            <tr key={m.label} style={soon?{background:"#FFF8F0"}:{}}>
              <td style={{...T.td,fontWeight:soon?500:400}}>
                {m.label}
                {soon&&<span style={{marginLeft:6,fontSize:10,color:"#854F0B",background:"#F5DDB0",padding:"1px 5px",borderRadius:3}}>soon</span>}
              </td>
              <td style={{...T.td,...T.r,...T.mono}}>{m.eur>0?f(m.eur,"EUR"):"—"}</td>
              <td style={{...T.td,...T.r,...T.mono}}>{m.usd>0?f(m.usd,"USD"):"—"}</td>
              <td style={{...T.td,...T.r,color:"#888"}}>{m.count}</td>
            </tr>
          );
        })}</tbody>
      </table>
      {receipts.length>0&&<>
        <h2 style={secHead}>Recent receipts</h2>
        <table style={{width:"100%",borderCollapse:"collapse"}}>
          <thead><tr>
            <th style={T.hd}>Date</th><th style={T.hd}>Source</th>
            <th style={T.hd}>Bank · Contract</th><th style={{...T.hd,...T.r}}>Amount</th>
          </tr></thead>
          <tbody>{receipts.slice(0,5).map(r=>(
            <tr key={r.id}>
              <td style={{...T.td,color:"#888",fontSize:11}}>{r.date}</td>
              <td style={{...T.td,fontWeight:500}}>{r.srcName}</td>
              <td style={{...T.td,...T.mono,color:"#888"}}>{r.bk} · {r.ctrNum}</td>
              <td style={{...T.td,...T.r,...T.mono,fontWeight:500}}>{f(r.amt,r.cc)}</td>
            </tr>
          ))}</tbody>
        </table>
      </>}
    </div>
  );
}

// ── Reconciliation ────────────────────────────────────────────────────────────
function ReconPage({personal}) {
  const diffs=MASTER_SEED.map(m=>{
    const p=personal.find(c=>c.id===m.id); if(!p)return null;
    const amtDiff=p.amt-m.amt, valDiff=p.val-m.val;
    if(amtDiff===0&&valDiff===0)return null;
    return {id:m.id,bk:m.bk,num:m.num,cc:m.cc,st:m.st,mAmt:m.amt,pAmt:p.amt,amtDiff,mVal:m.val,pVal:p.val,valDiff};
  }).filter(Boolean);
  return (
    <div>
      <PH title="Reconciliation" sub="Master sheet vs your copy · discrepancy report"/>
      <Cards items={[
        {label:"Total contracts",    value:String(MASTER_SEED.length)},
        {label:"Discrepancies found",value:String(diffs.length),sub:diffs.length>0?"needs review":"all clear"},
        {label:"Clean contracts",    value:String(MASTER_SEED.length-diffs.length)},
      ]}/>
      {diffs.length===0?(
        <div style={{textAlign:"center",padding:"40px 20px",color:"#bbb",fontSize:13}}>No discrepancies — your copy matches the master on all {MASTER_SEED.length} contracts.</div>
      ):(
        <>
          <div style={{background:"#FFF8F0",border:"0.5px solid #F5DDB0",borderRadius:8,padding:"10px 14px",marginBottom:20,fontSize:12,color:"#854F0B",display:"flex",gap:8,alignItems:"flex-start"}}>
            <IcoAlert size={14} style={{marginTop:1,flexShrink:0}}/>
            <span>{diffs.length} contract{diffs.length!==1?"s":""} differ. Review and confirm before next reconciliation.</span>
          </div>
          <table style={{width:"100%",borderCollapse:"collapse"}}>
            <thead><tr>
              <th style={T.hd}>Bank</th><th style={T.hd}>Contract #</th><th style={T.hd}>Pair</th>
              <th style={{...T.hd,...T.r}}>Master</th><th style={{...T.hd,...T.r}}>My copy</th><th style={{...T.hd,...T.r}}>Diff</th>
            </tr></thead>
            <tbody>{diffs.map(d=>(
              <tr key={d.id} style={{background:"#FFF8F0"}}>
                <td style={T.td}><span style={{fontSize:10,fontWeight:500,color:BANK_CLR[d.bk]}}>{d.bk}</span></td>
                <td style={{...T.td,...T.mono}}>{d.num}</td>
                <td style={T.td}><CcyTag cc={d.cc}/></td>
                <td style={{...T.td,...T.r,...T.mono,color:"#888"}}>{f(d.mAmt,d.cc)}</td>
                <td style={{...T.td,...T.r,...T.mono}}>{f(d.pAmt,d.cc)}</td>
                <td style={{...T.td,...T.r,...T.mono,fontWeight:500,color:d.amtDiff>0?"#854F0B":"#A32D2D"}}>{d.amtDiff>0?"+":""}{f(d.amtDiff,d.cc)}</td>
              </tr>
            ))}</tbody>
          </table>
        </>
      )}
    </div>
  );
}

// ── Backups ───────────────────────────────────────────────────────────────────
function BackupsPage({snapshots,setSnapshots,inflow,setInflow,master,setMaster,personal,setPersonal,receipts,setReceipts}) {
  const [cpLabel,setCpLabel]=useState("");
  const [savingCp,setSavingCp]=useState(false);
  const [msg,setMsg]=useState(null);
  const fileRef=useRef(null);
  const flash=(text,err=false)=>{setMsg({text,err});setTimeout(()=>setMsg(null),4000);};

  const saveCheckpoint=()=>{
    if(!cpLabel.trim())return;
    const snap={id:Date.now(),ts:new Date().toISOString(),label:fmtSnapLbl(),trigger:cpLabel.trim(),type:"manual",state:{inflow,master,personal,receipts}};
    const manuals=snapshots.filter(s=>s.type==="manual");
    const autos  =snapshots.filter(s=>s.type==="auto");
    const next=[snap,...manuals].slice(0,20).concat(autos).sort((a,b)=>b.id-a.id);
    setSnapshots(next); LS.set(K.snaps,next);
    setCpLabel(""); setSavingCp(false);
    flash(`Checkpoint saved: "${snap.trigger}"`);
  };

  const restore=(snap)=>{
    if(!window.confirm(`Restore to snapshot:\n"${snap.trigger}"\n${snap.label}\n\nThis will replace all current data.`))return;
    // Save current state as a manual checkpoint before restoring
    const beforeSnap={id:Date.now(),ts:new Date().toISOString(),label:fmtSnapLbl(),trigger:`Before restore to: ${snap.label}`,type:"manual",state:{inflow,master,personal,receipts}};
    const {inflow:i,master:m,personal:p,receipts:r}=snap.state;
    setInflow(i); setMaster(m); setPersonal(p); setReceipts(r);
    LS.set(K.inflow,i); LS.set(K.master,m); LS.set(K.personal,p); LS.set(K.receipts,r);
    const manuals=[beforeSnap,...snapshots.filter(s=>s.type==="manual")].slice(0,20);
    const autos=snapshots.filter(s=>s.type==="auto");
    const next=[...manuals,...autos].sort((a,b)=>b.id-a.id);
    setSnapshots(next); LS.set(K.snaps,next);
    flash(`Restored to ${snap.label}`);
  };

  const deleteSnap=(id)=>{
    const next=snapshots.filter(s=>s.id!==id);
    setSnapshots(next); LS.set(K.snaps,next);
  };

  const exportAll=()=>{
    const data={exportedAt:new Date().toISOString(),version:"1.0",inflow,master,personal,receipts,snapshots};
    const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");
    a.href=url; a.download=`forex-backup-${fmtISO(todayISO())}.json`; a.click();
    URL.revokeObjectURL(url);
    flash("Full backup exported");
  };

  const exportSnap=(snap)=>{
    const blob=new Blob([JSON.stringify({exportedAt:new Date().toISOString(),snapshot:snap},null,2)],{type:"application/json"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");
    a.href=url; a.download=`forex-snap-${snap.label.replace(/[·: ]/g,"-")}.json`; a.click();
    URL.revokeObjectURL(url);
  };

  const importFile=(e)=>{
    const file=e.target.files[0]; if(!file)return;
    const reader=new FileReader();
    reader.onload=(ev)=>{
      try {
        const data=JSON.parse(ev.target.result);
        if(!data.inflow||!data.master||!data.personal||!data.receipts){flash("Invalid backup file — missing required fields",true);return;}
        if(!window.confirm("Import this backup? All current data will be replaced."))return;
        setInflow(data.inflow); setMaster(data.master); setPersonal(data.personal); setReceipts(data.receipts);
        LS.set(K.inflow,data.inflow); LS.set(K.master,data.master); LS.set(K.personal,data.personal); LS.set(K.receipts,data.receipts);
        if(data.snapshots){setSnapshots(data.snapshots);LS.set(K.snaps,data.snapshots);}
        flash("Backup imported successfully");
      } catch {flash("Failed to read file — is it a valid backup?",true);}
    };
    reader.readAsText(file);
    e.target.value="";
  };

  const manuals =snapshots.filter(s=>s.type==="manual");
  const autos   =snapshots.filter(s=>s.type==="auto");
  const secHd={fontSize:11,fontWeight:600,color:"#999",textTransform:"uppercase",letterSpacing:"0.07em",margin:"20px 0 10px",paddingBottom:6,borderBottom:"0.5px solid #e5e5e3"};
  const snapRow=(snap,showDel=true)=>(
    <div key={snap.id} style={{display:"grid",gridTemplateColumns:"140px 1fr auto",gap:12,alignItems:"center",padding:"9px 0",borderBottom:"0.5px solid #f0f0ee"}}>
      <div>
        <div style={{fontSize:11,fontWeight:500,...T.mono}}>{snap.label}</div>
        <span style={{fontSize:10,padding:"1px 5px",borderRadius:3,fontWeight:500,background:snap.type==="manual"?"#E6F1FB":"#f0f0ee",color:snap.type==="manual"?"#0C447C":"#888"}}>{snap.type==="manual"?"Checkpoint":"Auto-save"}</span>
      </div>
      <div style={{fontSize:12,color:"#555",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{snap.trigger}</div>
      <div style={{display:"flex",gap:6,flexShrink:0}}>
        <button onClick={()=>restore(snap)} style={{...T.btnG,fontSize:11,padding:"5px 10px"}}><IcoRestore size={12}/>Restore</button>
        <button onClick={()=>exportSnap(snap)} style={{...T.btnG,fontSize:11,padding:"5px 8px"}} title="Download this snapshot"><IcoDownload size={12}/></button>
        {showDel&&<button onClick={()=>deleteSnap(snap.id)} style={{...T.btnG,fontSize:11,padding:"5px 8px",color:"#ccc"}} title="Delete"><IcoTrash size={12}/></button>}
      </div>
    </div>
  );

  return (
    <div>
      <PH title="Backups" sub="Version history · auto-saves + manual checkpoints"/>
      <Cards items={[
        {label:"Auto-saves",    value:String(autos.length),   sub:"last 50 kept"},
        {label:"Checkpoints",   value:String(manuals.length), sub:"last 20 kept"},
        {label:"Total snapshots",value:String(snapshots.length)},
      ]}/>

      {/* Action bar */}
      <div style={{display:"flex",gap:8,marginBottom:4,flexWrap:"wrap"}}>
        <button style={{...T.btnG}} onClick={()=>setSavingCp(true)}><IcoSave size={14}/>Save checkpoint</button>
        <button style={{...T.btnG}} onClick={exportAll}><IcoDownload size={14}/>Export all data</button>
        <button style={{...T.btnG}} onClick={()=>fileRef.current.click()}><IcoUpload size={14}/>Import from file</button>
        <input ref={fileRef} type="file" accept=".json" style={{display:"none"}} onChange={importFile}/>
      </div>
      {msg&&<div style={{fontSize:12,color:msg.err?"#A32D2D":"#0F6E56",marginTop:8}}>{msg.text}</div>}

      {/* Checkpoint form */}
      {savingCp&&(
        <div style={{marginTop:14,padding:14,background:"#f7f7f5",borderRadius:8}}>
          <label style={T.lbl}>Checkpoint label</label>
          <div style={{display:"flex",gap:8,marginTop:4}}>
            <input style={{...T.inp,flex:1}} value={cpLabel} onChange={e=>setCpLabel(e.target.value)} placeholder="e.g. Before adding Ghana contracts" autoFocus/>
            <button style={T.btn} onClick={saveCheckpoint}>Save</button>
            <button style={T.btnG} onClick={()=>setSavingCp(false)}>Cancel</button>
          </div>
        </div>
      )}

      {/* Manual checkpoints */}
      <div style={secHd}>Checkpoints <span style={{fontWeight:400,color:"#bbb",fontSize:10,marginLeft:6}}>kept until deleted or limit of 20</span></div>
      {manuals.length===0?(
        <div style={{color:"#bbb",fontSize:12,padding:"12px 0"}}>No checkpoints yet — save one before making a big change.</div>
      ):manuals.map(s=>snapRow(s,true))}

      {/* Auto-saves */}
      <div style={secHd}>Auto-saves <span style={{fontWeight:400,color:"#bbb",fontSize:10,marginLeft:6}}>last 50 · saved on every receipt or change</span></div>
      {autos.length===0?(
        <div style={{color:"#bbb",fontSize:12,padding:"12px 0"}}>No auto-saves yet — they appear automatically when you log receipts.</div>
      ):autos.map(s=>snapRow(s,false))}
    </div>
  );
}

// ── App root ──────────────────────────────────────────────────────────────────
function App() {
  const [page,setPage]               =useState("dashboard");
  const [inflow,setInflow]           =useState(null);
  const [master,setMaster]           =useState(null);
  const [personal,setPersonal]       =useState(null);
  const [receipts,setReceipts]       =useState([]);
  const [limits,setLimits]           =useState(null);
  const [snapshots,setSnapshots]     =useState([]);
  const [lastUpdated,setLastUpdated] =useState(todayISO());
  const [ready,setReady]             =useState(false);

  useEffect(()=>{
    const ms=seedMaster(), ps=seedPersonal();
    setInflow(LS.get(K.inflow,INFLOW_SEED));
    setMaster(LS.get(K.master,ms));
    setPersonal(LS.get(K.personal,ps));
    setReceipts(LS.get(K.receipts,[]));
    setLimits(LS.get(K.limits,LIMITS_SEED));
    setSnapshots(LS.get(K.snaps,[]));
    setLastUpdated(LS.get(K.updated,todayISO()));
    setReady(true);
  },[]);

  // bump: called on every data change — updates last-updated date + saves auto-snapshot
  const bump=useCallback((trigger,newState)=>{
    const d=todayISO();
    setLastUpdated(d); LS.set(K.updated,d);
    setSnapshots(prev=>{
      const snap={id:Date.now(),ts:new Date().toISOString(),label:fmtSnapLbl(),trigger,type:"auto",
        state:newState||{inflow,master,personal,receipts}};
      const autos=[snap,...prev.filter(s=>s.type==="auto")].slice(0,50);
      const manuals=prev.filter(s=>s.type==="manual");
      const next=[...manuals,...autos].sort((a,b)=>b.id-a.id);
      LS.set(K.snaps,next);
      return next;
    });
  },[inflow,master,personal,receipts]);

  if(!ready)return null;

  return (
    <div style={{maxWidth:760,margin:"0 auto",padding:"0 16px"}}>
      <div style={{paddingTop:10,marginBottom:4}}>
        <span style={{fontSize:13,fontWeight:500,color:"#555"}}>
          Forex Contract Updated as on {fmtISO(lastUpdated)}
        </span>
      </div>
      <TopNav page={page} setPage={setPage}/>
      {page==="dashboard" && <DashboardPage personal={personal} inflow={inflow} limits={limits} receipts={receipts}/>}
      {page==="contracts" && <ContractsPage master={master} personal={personal}/>}
      {page==="inflow"    && <InflowPage inflow={inflow} setInflow={setInflow} bump={bump}/>}
      {page==="receipts"  && <ReceiptsPage inflow={inflow} setInflow={setInflow} personal={personal} setPersonal={setPersonal} master={master} setMaster={setMaster} receipts={receipts} setReceipts={setReceipts} bump={bump}/>}
      {page==="limits"    && <LimitsPage limits={limits}/>}
      {page==="recon"     && <ReconPage personal={personal}/>}
      {page==="backups"   && <BackupsPage snapshots={snapshots} setSnapshots={setSnapshots} inflow={inflow} setInflow={setInflow} master={master} setMaster={setMaster} personal={personal} setPersonal={setPersonal} receipts={receipts} setReceipts={setReceipts}/>}
    </div>
  );
}

const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
</script>
</body>
</html>
